<!doctype html>
<html lang="de">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>We Love Musicals – Die besten Musicals in Deutschland</title>
    <meta name="description" content="Entdecke die besten Musicals in Deutschland. Tickets für König der Löwen, Eiskönigin, Pretty Woman und mehr. Jetzt buchen und Hotels finden!" />
    <meta name="keywords" content="Musicals Deutschland, Musical Tickets, König der Löwen, Eiskönigin, Hamburg, Stuttgart, Berlin" />
    <meta name="author" content="We Love Musicals" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#1a1a2e" />
    
    <!-- Critical CSS - Prevents FOUC (Flash of Unstyled Content) -->
    <style>
      /* Prevent white/black flash before CSS loads */
      html {
        background-color: #1a1a2e;
        color: #e8dcc8;
        margin: 0;
        padding: 0;
      }
      
      body {
        background-color: #1a1a2e;
        color: #e8dcc8;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      }
      
      /* Ensure root div doesn't cause flash */
      #root {
        background-color: #1a1a2e;
        color: #e8dcc8;
      }
    </style>
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- Theme Bootstrap - Apply dark class before React mounts -->
    <script>
      (function() {
        // Ensure dark theme is applied immediately
        document.documentElement.classList.add('dark');
        document.documentElement.style.backgroundColor = '#1a1a2e';
        document.documentElement.style.color = '#e8dcc8';
        
        // Also set on body for extra safety
        if (document.body) {
          document.body.style.backgroundColor = '#1a1a2e';
          document.body.style.color = '#e8dcc8';
        }
        
        // Store theme preference
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.welovemusicals.com/" />
    <meta property="og:title" content="We Love Musicals – Die besten Musicals in Deutschland" />
    <meta property="og:description" content="Entdecke die besten Musicals in Deutschland. Tickets für König der Löwen, Eiskönigin, Pretty Woman und mehr." />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663510091225/JeioEZoPZ6g8uvSM7g4a8t/hero-stage-LExvJcmcPP3dpbDQunFpAD.webp" />
    
    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.welovemusicals.com/" />
    <meta property="twitter:title" content="We Love Musicals – Die besten Musicals in Deutschland" />
    <meta property="twitter:description" content="Entdecke die besten Musicals in Deutschland. Tickets für König der Löwen, Eiskönigin, Pretty Woman und mehr." />
    <meta property="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663510091225/JeioEZoPZ6g8uvSM7g4a8t/hero-stage-LExvJcmcPP3dpbDQunFpAD.webp" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  </head>

  <body style="background-color:#1a1a2e;color:#e8dcc8;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics Script - Loaded via main.tsx to handle env vars -->
    <script>
      (function() {
        if (window.__VITE_ANALYTICS_ENDPOINT__ && window.__VITE_ANALYTICS_WEBSITE_ID__) {
          const script = document.createElement('script');
          script.defer = true;
          script.src = window.__VITE_ANALYTICS_ENDPOINT__ + '/umami';
          script.setAttribute('data-website-id', window.__VITE_ANALYTICS_WEBSITE_ID__);
          document.body.appendChild(script);
        }
      })();
    </script>
  </body>

</html>
