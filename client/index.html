<!doctype html>
<html lang="de">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>We Love Musicals – Die besten Musicals in Deutschland</title>
    <meta name="description" content="Entdecke die besten Musicals in Deutschland. Tickets für König der Löwen, Eiskönigin, Pretty Woman und mehr. Jetzt buchen und Hotels finden!" />
    <meta name="keywords" content="Musicals Deutschland, Musical Tickets, König der Löwen, Eiskönigin, Hamburg, Stuttgart, Berlin" />
    <meta name="author" content="We Love Musicals" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#1a1a2e" />
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- Critical CSS for skeleton loader -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        background-color: #1a1a2e;
        color: #e8dcc8;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      }
      
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      .skeleton-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #1a1a2e;
        z-index: 9998;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      
      .skeleton-header {
        padding: 16px 20px;
        border-bottom: 1px solid #2a2a3e;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .skeleton-logo {
        width: 150px;
        height: 32px;
        background: linear-gradient(90deg, #2a2a3e 0%, #3a3a4e 50%, #2a2a3e 100%);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
        border-radius: 4px;
      }
      
      .skeleton-nav {
        width: 100px;
        height: 32px;
        background: linear-gradient(90deg, #2a2a3e 0%, #3a3a4e 50%, #2a2a3e 100%);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
        border-radius: 4px;
      }
      
      .skeleton-hero {
        width: 100%;
        height: 300px;
        background: linear-gradient(90deg, #2a2a3e 0%, #3a3a4e 50%, #2a2a3e 100%);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
      }
      
      .skeleton-content {
        padding: 20px;
        flex: 1;
      }
      
      .skeleton-title {
        width: 80%;
        height: 28px;
        background: linear-gradient(90deg, #2a2a3e 0%, #3a3a4e 50%, #2a2a3e 100%);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
        border-radius: 4px;
        margin-bottom: 16px;
      }
      
      .skeleton-text {
        width: 100%;
        height: 16px;
        background: linear-gradient(90deg, #2a2a3e 0%, #3a3a4e 50%, #2a2a3e 100%);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
        border-radius: 4px;
        margin-bottom: 12px;
      }
      
      .skeleton-text:last-of-type {
        width: 90%;
        margin-bottom: 20px;
      }
      
      .skeleton-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      
      .skeleton-card {
        height: 250px;
        background: linear-gradient(90deg, #2a2a3e 0%, #3a3a4e 50%, #2a2a3e 100%);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
        border-radius: 8px;
      }
      
      #root {
        display: none;
      }
      
      #root.loaded {
        display: block;
      }
      
      .skeleton-loader.hidden {
        display: none;
      }
    </style>
    
    <!-- Theme Bootstrap - Apply dark class before React mounts -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
        document.documentElement.style.backgroundColor = '#1a1a2e';
        document.body.style.backgroundColor = '#1a1a2e';
      })();
    </script>
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.welovemusicals.com/" />
    <meta property="og:title" content="We Love Musicals – Die besten Musicals in Deutschland" />
    <meta property="og:description" content="Entdecke die besten Musicals in Deutschland. Tickets für König der Löwen, Eiskönigin, Pretty Woman und mehr." />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663510091225/JeioEZoPZ6g8uvSM7g4a8t/hero-stage-LExvJcmcPP3dpbDQunFpAD.webp" />
    
    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.welovemusicals.com/" />
    <meta property="twitter:title" content="We Love Musicals – Die besten Musicals in Deutschland" />
    <meta property="twitter:description" content="Entdecke die besten Musicals in Deutschland. Tickets für König der Löwen, Eiskönigin, Pretty Woman und mehr." />
    <meta property="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663510091225/JeioEZoPZ6g8uvSM7g4a8t/hero-stage-LExvJcmcPP3dpbDQunFpAD.webp" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  </head>

  <body style="background-color:#1a1a2e;color:#e8dcc8;">
    <!-- Skeleton Loading Screen (shown while React loads) -->
    <div id="skeleton-loader" class="skeleton-loader">
      <div class="skeleton-header">
        <div class="skeleton-logo"></div>
        <div class="skeleton-nav"></div>
      </div>
      <div class="skeleton-hero"></div>
      <div class="skeleton-content">
        <div class="skeleton-title"></div>
        <div class="skeleton-text"></div>
        <div class="skeleton-text"></div>
        <div class="skeleton-text"></div>
        <div class="skeleton-cards">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>
    </div>
    
    <!-- React Root -->
    <div id="root"></div>
    
    <!-- Main App Script -->
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Analytics -->
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
