name = "welovemusicals"
compatibility_date = "2026-04-04"

[build]
command = "pnpm run build"
cwd = "."

[build.upload]
format = "service-worker"

[[routes]]
pattern = "*"
zone_name = "welovemusicals.com"

[env.production]
routes = [
  { pattern = "welovemusicals.com/*", zone_name = "welovemusicals.com" }
]

[observability]
enabled = true
