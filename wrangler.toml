name = "welovemusicals"
main = "dist/index.js"
compatibility_date = "2026-04-04"
compatibility_flags = ["nodejs_compat"]

[build]
command = "pnpm run build"
cwd = "."

[env.production]
routes = [
  { pattern = "welovemusicals.com/*", zone_name = "welovemusicals.com" }
]

[observability]
enabled = true
